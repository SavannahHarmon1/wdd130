<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #eee;
            height: 100vh;
            margin: 0;
            padding-top: 20px;
        }
        .poster {
            width: 900px;
            height: 900px;
            border: 10px solid black;
            border-radius: 25px;
            background: url('images/christus.webp') top center / cover no-repeat;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        h1, h2 {
            font-family: Arial, Helvetica, sans-serif;
            color: #E8ECED;
            margin: 10px 0;
        }
        .row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        img {
            border: 5px solid #E8ECED;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            object-fit: cover;
            object-position: 50% 20%;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="poster">
        <h1>First Presidency</h1>
            <div class="row">
                <img id="eyring" src="images/eyring.webp" alt="Henry B. Eyring">
                <img id="oaks" src="images/oaks.webp" alt="Dallin H. Oaks">
                <img id="christofferson" src="images/christofferson.webp" alt="D. Todd Christofferson">
            </div>
        <h2>Quorum of the Twelve Apostles</h2>
            <div class="row">
                <img id="holland" src="images/holland.webp" alt="Jeffrey R. Holland">
                <img id="uchtdorf" src="images/uchtdorf.webp" alt="Dieter F. Uchtdorf">
                <img id="bednar" src="images/bednar.webp" alt="David A. Bednar">
                <img id="cook" src="images/cook.webp" alt="Quentin L. Cook">
            </div>
            <div class="row">
                <img id="anderson" src="images/anderson.webp" alt="Neil L. Anderson">
                <img id="rasband" src="images/rasband.webp" alt="Ronald A. Rasband">       
                <img id="stevenson" src="images/stevenson.webp" alt="Gary E. Stevenson">
                <img id="renlund" src="images/renlund.webp" alt="Dale G. Renlund">
            </div>
            <div class="row">
                <img id="gong" src="images/gong.webp" alt="Gerrit W. Gong">
                <img id="soares" src="images/soares.webp" alt="Ulisses Soares">
                <img id="kearon" src="images/kearon.webp" alt="Patrick Kearon">
                <img id="causse" src="images/causse.webp" alt="Gerald Causse">
            </div>
    </div>
    <!-- Insert HTML elements here -->
</body>
</html>
